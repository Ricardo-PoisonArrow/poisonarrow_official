<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoisonArrow DJ | Official Site</title>
    <script src="https://embed.twitch.tv/v1/embed.js"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: #050505; color: #ffffff;
            line-height: 1.6; overflow-x: hidden;
        }

        /* UNIVERSAL HEADER */
        header {
            background-color: rgba(0, 0, 0, 0.95);
            padding: 15px 50px;
            position: fixed; width: 100%; top: 0;
            z-index: 1000; display: flex;
            justify-content: space-between; align-items: center;
            box-sizing: border-box; border-bottom: 1px solid #222;
        }
        .logo { max-width: 160px; height: auto; }
        nav ul { margin: 0; padding: 0; list-style: none; }
        nav ul li { display: inline; margin-left: 20px; }
        nav a {
            text-decoration: none; color: #fff;
            font-weight: 600; text-transform: uppercase;
            font-size: 11px; letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #39ff14; }

        /* HERO */
        .hero {
            height: 100vh; display: flex;
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), #111;
        }
        .hero h1 { font-size: clamp(3.5rem, 10vw, 7rem); margin: 0; letter-spacing: -3px; }
        .hero p { font-size: 1.2rem; color: #00f2fe; margin: 10px 0 30px; letter-spacing: 6px; }
        .btn { background: #ff00de; color: #fff; padding: 18px 35px; text-decoration: none; font-weight: bold; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #39ff14; color: #000; transform: scale(1.05); }

        /* CONTENT SECTIONS */
        .container { width: 92%; max-width: 1400px; margin: auto; padding: 100px 0; }
        .section-title { text-align: center; text-transform: uppercase; font-size: clamp(2rem, 5vw, 2.8rem); margin-bottom: 50px; letter-spacing: 3px; }
        .section-title span { color: #ff00de; }
        
        /* MIXES */
        .video-carousel {
            display: flex; overflow-x: auto; gap: 25px;
            padding: 20px 0 40px 0; scroll-snap-type: x mandatory;
        }
        .video-card { flex: 0 0 450px; scroll-snap-align: start; background: #0c0c0c; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* GENRES */
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .genre-card { background: #0f0f0f; padding: 25px; text-align: center; border: 1px solid #222; border-radius: 12px; transition: 0.3s; }
        .bpm-tag { color: #39ff14; font-size: 11px; font-weight: bold; }

        /* 2. UPDATED LIVE SECTION CSS */
        #twitch-embed { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            border-radius: 8px; 
            border: 1px solid #222; 
            background: #000;
        }

        footer { background: #000; text-align: center; padding: 60px; border-top: 1px solid #222; }

        @media (max-width: 600px) { .video-card { flex: 0 0 85%; } header { padding: 15px 20px; } }
    </style>
</head>
<body>

    <header>
        <img src="Hi_Res_Logo.png" alt="PoisonArrow Logo" class="logo">
        <nav>
            <ul>
                <li><a href="#music">Mixes</a></li>
                <li><a href="crews.html" style="color: #39ff14;">Crews</a></li>
                <li><a href="#genres">Sound</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#live">Live</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>POISONARROW</h1>
        <p>SONIC DESTRUCTION</p>
        <img src="Banner.jpg" alt="PoisonArrow Logo" class="logo">
        <a href="#live" class="btn">Watch Live Now</a>
    </section>

    <div class="container">
        <section id="live">
            <h2 class="section-title">Watch <span>Live</span></h2>
            <div id="twitch-embed"></div>
        </section>
    </div>

    <footer><p>&copy; 2026 PoisonArrow Productions. All Rights Reserved.</p></footer>

    <script type="text/javascript">
      new Twitch.Embed("twitch-embed", {
        width: "100%",
        height: "100%",
        channel: "poisonarrow_dj", 
        // IMPORTANT: Replace 'yourdomain.com' with your actual domain name
        parent: ["localhost", "poisonarrow-official.atwebpages.com"], 
        theme: "dark",
        autoplay: false,
        layout: "video-with-chat" // Use "video-with-chat" to include the chat box
      });
    </script>
</body>
</html>
