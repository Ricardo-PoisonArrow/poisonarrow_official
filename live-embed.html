<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #twitch-player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="twitch-player"></div>
    <script src="https://embed.twitch.tv/v1/embed.js"></script>
    <script type="text/javascript">
        new Twitch.Embed("twitch-player", {
            width: "100%",
            height: "100%",
            channel: "poisonarrow_dj",
            // Keep localhost for testing; add your domain when you go live
            parent: ["https://www.twitch.tv/poisonarrow_dj"], 
            theme: "dark",
            layout: "video",
            autoplay: false
        });
    </script>
</body>
</html>
